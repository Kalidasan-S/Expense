
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">Expense Tracker</a>

    <div>
        {% if user.is_authenticated %}
            <span class="text-white me-3">Hi {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-light">Logout</a>

        {% else %}
            <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light me-2">Login</a>
            <a href="{% url 'register' %}" class="btn btn-sm btn-outline-success">Register</a>
        {% endif %}
    </div>
</nav>
